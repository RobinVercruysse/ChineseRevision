<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
    <head>
        <title>Chinese Revision</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" th:href="@{/css/home.css}" href="../static/css/home.css">
        <script th:src="@{/js/jquery-4.0.0.min.js}" src="../static/js/jquery-4.0.0.min.js" type="text/javascript"></script>
        <script>
            function flipCard() {
                const flashcard = $('.flashcard');
                flashcard.toggleClass('flipped');
            }
        </script>
    </head>
    <body>
        <div class="flashcard" onclick="flipCard()">
            <div class="flashcard-front" th:text="${word.traditionalCharacter}"></div>
            <div class="flashcard-back">
                <div th:text="${word.traditionalCharacter}"></div>
                <div th:text="${word.pinyin}"></div>
                <div th:text="${word.english}"></div>
            </div>
        </div>
    </body>
</html>
